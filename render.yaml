services:
  - type: web
    name: farmwise
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput --clear"
    startCommand: "bash start.sh"
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: farmwise_db
          property: connectionString

databases:
  - name: farmwise_db
    databaseName: farmwise
    plan: free
