services:
  - type: web
    name: farmwise
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear"
    startCommand: "python -m gunicorn farmwise.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    plans: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: farmwise_db
    databaseName: farmwise
    plan: free
