services:
  - type: web
    name: farmwise
    runtime: python
    pythonVersion: 3.11
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    healthCheckPath: /
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        sync: false

databases:
  - name: farmwise_db
    databaseName: farmwise
    plan: free
