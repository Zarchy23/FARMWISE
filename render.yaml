services:
  - type: web
    name: farmwise
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn farmwise.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --worker-class sync --timeout 120"
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: farmwise_db
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@farmwise.com"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: SENDGRID_API_KEY
        generateValue: true
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: APP_URL
        value: "https://farmwise.onrender.com"

databases:
  - name: farmwise_db
    databaseName: farmwise
    plan: free
