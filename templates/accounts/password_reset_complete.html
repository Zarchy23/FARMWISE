{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block page_title %}Password Updated{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8 text-center">
        <i class="ri-checkbox-circle-line text-6xl text-green-600 mb-4"></i>
        <h2 class="text-2xl font-bold mb-2">Password Reset Complete</h2>
        <p class="text-gray-600 mb-6">
            Your password has been successfully reset. You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition inline-block">Login Now</a>
    </div>
</div>
{% endblock %}
