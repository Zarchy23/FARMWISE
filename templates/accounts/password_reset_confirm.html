{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block page_title %}Set New Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <i class="ri-lock-line text-5xl text-green-600"></i>
            <h2 class="text-2xl font-bold mt-2">Set New Password</h2>
            <p class="text-gray-500">Create a new secure password</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">New Password</label>
                <input type="password" name="new_password1" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                <p class="text-xs text-gray-500 mt-1">Minimum 8 characters, not too common</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">Confirm New Password</label>
                <input type="password" name="new_password2" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
