{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block page_title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <i class="ri-lock-password-line text-5xl text-green-600"></i>
            <h2 class="text-2xl font-bold mt-2">Reset Password</h2>
            <p class="text-gray-500">Enter your email to receive reset link</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="your@email.com">
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Send Reset Link</button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-green-600 hover:underline">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
