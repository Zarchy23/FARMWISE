{% extends 'base.html' %}
{% block title %}Reset Link Sent{% endblock %}
{% block page_title %}Check Your Email{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8 text-center">
        <i class="ri-mail-send-line text-6xl text-green-600 mb-4"></i>
        <h2 class="text-2xl font-bold mb-2">Reset Link Sent</h2>
        <p class="text-gray-600 mb-6">
            We've emailed you instructions for setting your password.
            You should receive the email shortly.
        </p>
        <a href="{% url 'login' %}" class="text-green-600 hover:underline">Return to Login</a>
    </div>
</div>
{% endblock %}
