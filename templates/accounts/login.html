{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <i class="ri-leaf-line text-5xl text-green-600"></i>
            <h2 class="text-2xl font-bold mt-2">Welcome Back</h2>
            <p class="text-gray-500">Login to your FarmWise account</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Username</label>
                <input type="text" name="username" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="rounded border-gray-300 text-green-600 focus:ring-green-500">
                    <span class="ml-2 text-sm text-gray-600">Remember me</span>
                </label>
                <a href="{% url 'password_reset' %}" class="text-sm text-green-600 hover:underline">Forgot password?</a>
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Login</button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-600">Don't have an account? <a href="{% url 'core:register' %}" class="text-green-600 hover:underline">Register</a></p>
        </div>
        
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">Or continue with</span>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <a href="#" class="border border-gray-300 rounded-lg py-2 text-center hover:bg-gray-50 transition">
                <i class="ri-google-line text-red-600"></i> Google
            </a>
            <a href="#" class="border border-gray-300 rounded-lg py-2 text-center hover:bg-gray-50 transition">
                <i class="ri-facebook-line text-blue-600"></i> Facebook
            </a>
        </div>
    </div>
</div>
{% endblock %}
