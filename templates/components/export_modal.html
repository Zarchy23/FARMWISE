<!-- Export Modal Component - Fixed -->
<div id="exportModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50" data-export-url="{{ export_url }}">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <div class="mt-3 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
                <i class="ri-download-line text-green-600 text-xl"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mt-3">Export Data</h3>
            <div class="mt-4 px-7 py-3">
                <div class="mb-3 text-left">
                    <label class="block text-sm font-medium text-gray-700">Format</label>
                    <select id="exportFormat" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
                        <option value="csv">CSV (Excel)</option>
                        <option value="pdf">PDF Report</option>
                        <option value="excel">Excel (.xlsx)</option>
                    </select>
                </div>
                <div class="mb-3 text-left">
                    <label class="block text-sm font-medium text-gray-700">Date Range</label>
                    <select id="exportDateRange" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
                        <option value="all">All Time</option>
                        <option value="month">Last 30 Days</option>
                        <option value="year">Last 12 Months</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>
                <div id="customDateRange" class="hidden">
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="date" id="startDate" class="rounded-md border-gray-300 text-sm">
                        <input type="date" id="endDate" class="rounded-md border-gray-300 text-sm">
                    </div>
                </div>
            </div>
            <div class="items-center px-4 py-3">
                <button id="confirmExportBtn" class="px-4 py-2 bg-green-600 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">
                    Export
                </button>
                <button onclick="closeExportModal()" class="mt-2 px-4 py-2 bg-gray-100 text-gray-700 text-base font-medium rounded-md w-full shadow-sm hover:bg-gray-200">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function openExportModal() {
        const exportEndpoint = document.getElementById('exportModal').getAttribute('data-export-url');
        console.log('Export modal opened - URL: ' + exportEndpoint);
        document.getElementById('exportModal').classList.remove('hidden');
    }
    
    function closeExportModal() {
        document.getElementById('exportModal').classList.add('hidden');
    }
    
    document.getElementById('confirmExportBtn')?.addEventListener('click', function() {
        let format = document.getElementById('exportFormat').value;
        const dateRange = document.getElementById('exportDateRange').value;
        
        // Convert 'excel' to 'xlsx' for the API
        if (format === 'excel') {
            format = 'xlsx';
        }
        
        // Get export URL from modal's data attribute
        const exportEndpoint = document.getElementById('exportModal').getAttribute('data-export-url') || '';
        
        if (!exportEndpoint) {
            console.error('Export URL not found');
            alert('Error: Export URL not properly configured');
            return;
        }
        
        let url = exportEndpoint + '?format=' + format;
        
        // Calculate or add date range
        if (dateRange === 'custom') {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            if (startDate) url += '&start_date=' + startDate;
            if (endDate) url += '&end_date=' + endDate;
        } else if (dateRange === 'month') {
            const endDate = new Date();
            const startDate = new Date(endDate);
            startDate.setDate(startDate.getDate() - 30);
            url += '&start_date=' + startDate.toISOString().split('T')[0];
            url += '&end_date=' + endDate.toISOString().split('T')[0];
        } else if (dateRange === 'year') {
            const endDate = new Date();
            const startDate = new Date(endDate);
            startDate.setFullYear(startDate.getFullYear() - 1);
            url += '&start_date=' + startDate.toISOString().split('T')[0];
            url += '&end_date=' + endDate.toISOString().split('T')[0];
        }
        // For 'all', don't add date parameters - the service will use defaults
        
        console.log('Export URL: ' + url);
        window.location.href = url;
        closeExportModal();
    });
    
    document.getElementById('exportDateRange')?.addEventListener('change', function() {
        const customDiv = document.getElementById('customDateRange');
        if (this.value === 'custom') {
            customDiv.classList.remove('hidden');
        } else {
            customDiv.classList.add('hidden');
        }
    });
</script>
