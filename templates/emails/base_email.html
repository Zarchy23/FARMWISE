<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FarmWise{% endblock %}</title>
    <style>
        /* Reset styles */
        body, table, td, p, a {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
        }
        
        /* Main container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Header */
        .email-header {
            background: linear-gradient(135deg, #16a34a, #15803d);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
        
        .email-header h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        
        .email-header p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }
        
        /* Content */
        .email-content {
            padding: 30px;
            background: #ffffff;
        }
        
        /* Footer */
        .email-footer {
            background: #f8fafc;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
        }
        
        .email-footer a {
            color: #16a34a;
            text-decoration: none;
        }
        
        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #16a34a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 20px 0;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #15803d;
        }
        
        /* Alert boxes */
        .alert-high {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #7f1d1d;
        }
        
        .alert-medium {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #78350f;
        }
        
        .alert-low {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #065f46;
        }
        
        /* Stats grid */
        .stats-grid {
            display: table;
            width: 100%;
            margin: 20px 0;
        }
        
        .stat-card {
            display: table-cell;
            background: #f8fafc;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin: 0 5px;
            width: 25%;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #16a34a;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        
        /* Divider */
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }
        
        /* List styles */
        .feature-list {
            margin: 15px 0;
            padding-left: 20px;
        }
        
        .feature-list li {
            margin: 8px 0;
            color: #334155;
        }
        
        /* Responsive */
        @media only screen and (max-width: 480px) {
            .email-content {
                padding: 20px;
            }
            .btn {
                display: block;
                text-align: center;
            }
            .stats-grid {
                display: block;
            }
            .stat-card {
                display: block;
                margin: 10px 0;
                width: 100%;
            }
        }
    </style>
</head>
<body style="background: #f1f5f9; padding: 20px;">
    <div class="email-container">
        <div class="email-header">
            <h1>🌾 FarmWise</h1>
            <p>{% block header_subtitle %}Smart Agriculture Management{% endblock %}</p>
        </div>
        
        <div class="email-content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="email-footer">
            <p>© {% now "Y" %} FarmWise. All rights reserved.</p>
            <p>
                <a href="{{ app_url }}/">Home</a> |
                <a href="{{ app_url }}/privacy/">Privacy Policy</a> |
                <a href="mailto:{{ support_email }}">Contact Support</a>
            </p>
            <p style="margin-top: 10px; font-size: 11px;">
                FarmWise - Helping farmers grow smarter
            </p>
        </div>
    </div>
</body>
</html>
