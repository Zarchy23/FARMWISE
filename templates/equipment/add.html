{% extends 'base.html' %}
{% block title %}List Equipment{% endblock %}
{% block page_title %}List Equipment for Rent{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">List Your Equipment for Rent</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Equipment Name</label>
                <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="e.g., John Deere Tractor">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Category</label>
                <select name="category" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="tractor">Tractor</option>
                    <option value="harvester">Harvester</option>
                    <option value="planter">Planter</option>
                    <option value="sprayer">Sprayer</option>
                    <option value="plow">Plow</option>
                    <option value="cultivator">Cultivator</option>
                    <option value="trailer">Trailer</option>
                    <option value="irrigation">Irrigation Equipment</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Description</label>
                <textarea name="description" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Describe the equipment, its condition, features..."></textarea>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Daily Rate ($)</label>
                    <input type="number" step="0.01" name="daily_rate" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Price per day">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Security Deposit ($)</label>
                    <input type="number" step="0.01" name="deposit_amount" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Refundable deposit">
                </div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Weekly Rate ($)</label>
                    <input type="number" step="0.01" name="weekly_rate" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Optional">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Monthly Rate ($)</label>
                    <input type="number" step="0.01" name="monthly_rate" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Optional">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Location</label>
                <input type="text" name="location" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="City, address for pickup">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Equipment Images</label>
                <input type="file" name="images" multiple accept="image/*" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                <p class="text-sm text-gray-500 mt-1">Upload photos of the equipment (optional)</p>
            </div>
            
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">List Equipment</button>
                <a href="{% url 'core:equipment_list' %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
