{% extends 'base.html' %}
{% block title %}Edit Crop{% endblock %}
{% block page_title %}Edit Crop{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Edit Crop: {{ crop.crop_type.name }}</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Field <span class="text-red-500">*</span></label>
                    <select name="field" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">--Select Field--</option>
                        {% for f in form.field.field.queryset %}
                            <option value="{{ f.id }}" {% if crop.field.id == f.id %}selected{% endif %}>{{ f.farm.name }} - {{ f.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Crop Type <span class="text-red-500">*</span></label>
                    <select name="crop_type" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">--Select Crop Type--</option>
                        {% for ct in form.crop_type.field.queryset %}
                            <option value="{{ ct.id }}" {% if crop.crop_type.id == ct.id %}selected{% endif %}>{{ ct.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Variety <span class="text-red-500">*</span></label>
                    <input type="text" name="variety" value="{{ crop.variety }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Variety">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Season <span class="text-red-500">*</span></label>
                    <select name="season" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">--Select Season--</option>
                        <option value="spring" {% if crop.season == 'spring' %}selected{% endif %}>Spring</option>
                        <option value="summer" {% if crop.season == 'summer' %}selected{% endif %}>Summer</option>
                        <option value="autumn" {% if crop.season == 'autumn' %}selected{% endif %}>Autumn</option>
                        <option value="winter" {% if crop.season == 'winter' %}selected{% endif %}>Winter</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Status</label>
                <select name="status" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="planned" {% if crop.status == 'planned' %}selected{% endif %}>Planned</option>
                    <option value="planted" {% if crop.status == 'planted' %}selected{% endif %}>Planted</option>
                    <option value="growing" {% if crop.status == 'growing' %}selected{% endif %}>Growing</option>
                    <option value="harvested" {% if crop.status == 'harvested' %}selected{% endif %}>Harvested</option>
                    <option value="failed" {% if crop.status == 'failed' %}selected{% endif %}>Failed</option>
                </select>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Planting Date <span class="text-red-500">*</span></label>
                    <input type="date" name="planting_date" value="{{ crop.planting_date|date:'Y-m-d' }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Expected Harvest Date <span class="text-red-500">*</span></label>
                    <input type="date" name="expected_harvest_date" value="{{ crop.expected_harvest_date|date:'Y-m-d' }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Estimated Yield (kg)</label>
                <input type="number" step="0.01" name="estimated_yield_kg" value="{{ crop.estimated_yield_kg }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Yield in kg">
            </div>
            
            <!-- Photo -->
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Crop Photo <span class="text-gray-500">(Optional)</span></label>
                {% if crop.photo %}
                <div class="mb-3">
                    <img src="{{ crop.photo.url }}" alt="Crop photo" class="w-32 h-32 object-cover rounded-lg">
                    <p class="text-sm text-gray-500 mt-2">Current photo</p>
                </div>
                {% endif %}
                <input type="file" name="photo" accept="image/*" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                <p class="text-gray-500 text-sm mt-1">JPG, PNG, or GIF (Max 5MB)</p>
            </div>
            
            <!-- Notes -->
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Notes</label>
                <textarea name="notes" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">{{ crop.notes }}</textarea>
            
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Save Changes</button>
                <a href="{% url 'core:crop_detail' crop.id %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
