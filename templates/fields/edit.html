{% extends 'base.html' %}
{% block title %}Edit Field{% endblock %}
{% block page_title %}Edit Field{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Edit Field: {{ field.name }}</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Field Name</label>
                <input type="text" name="name" value="{{ field.name }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Area (hectares)</label>
                <input type="number" step="0.01" name="area_hectares" value="{{ field.area_hectares }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Soil Type</label>
                <select name="soil_type" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="sandy" {% if field.soil_type == 'sandy' %}selected{% endif %}>Sandy</option>
                    <option value="clay" {% if field.soil_type == 'clay' %}selected{% endif %}>Clay</option>
                    <option value="loamy" {% if field.soil_type == 'loamy' %}selected{% endif %}>Loamy</option>
                    <option value="silty" {% if field.soil_type == 'silty' %}selected{% endif %}>Silty</option>
                    <option value="peaty" {% if field.soil_type == 'peaty' %}selected{% endif %}>Peaty</option>
                </select>
            </div>
            
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Save Changes</button>
                <a href="{% url 'core:farm_detail' field.farm.id %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
