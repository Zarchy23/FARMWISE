{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block page_title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-16">
    <i class="ri-error-warning-line text-8xl text-gray-300 mb-6"></i>
    <h1 class="text-4xl font-bold text-gray-700 mb-4">Page Not Found</h1>
    <p class="text-gray-500 mb-8">Sorry, the page you are looking for does not exist or has been moved.</p>
    <a href="{% url 'core:dashboard' %}" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition inline-block">
        <i class="ri-home-line"></i> Return to Dashboard
    </a>
</div>
{% endblock %}
