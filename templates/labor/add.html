{% extends 'base.html' %}
{% block title %}Add Worker{% endblock %}
{% block page_title %}Add Farm Worker{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Add New Worker</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Select User Account</label>
                <select name="worker" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">-- Select User --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }} ({{ user.email }})</option>
                    {% endfor %}
                </select>
                <p class="text-sm text-gray-500 mt-1">Workers must have a registered account</p>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Select Farm</label>
                <select name="farm" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">-- Select Farm --</option>
                    {% for farm in farms %}
                    <option value="{{ farm.id }}">{{ farm.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Hourly Wage ($)</label>
                <input type="number" step="0.50" name="hourly_wage" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="e.g., 5.00">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Skills</label>
                <textarea name="skills" rows="2" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="e.g., Tractor driving, Harvesting, Irrigation, Pruning"></textarea>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Emergency Contact Name</label>
                    <input type="text" name="emergency_contact" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Emergency Phone</label>
                    <input type="tel" name="emergency_phone" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Notes</label>
                <textarea name="notes" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Additional information about the worker..."></textarea>
            </div>
            
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Add Worker</button>
                <a href="{% url 'core:labor' %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
