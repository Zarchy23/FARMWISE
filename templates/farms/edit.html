{% extends 'base.html' %}
{% block title %}Edit Farm{% endblock %}
{% block page_title %}Edit Farm{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Edit Farm</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Farm Name</label>
                <input type="text" name="name" value="{{ farm.name }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Total Area (hectares)</label>
                <input type="number" step="0.01" name="total_area_hectares" value="{{ farm.total_area_hectares }}" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Farm Type</label>
                <select name="farm_type" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="crop" {% if farm.farm_type == 'crop' %}selected{% endif %}>Crop Farm</option>
                    <option value="livestock" {% if farm.farm_type == 'livestock' %}selected{% endif %}>Livestock Farm</option>
                    <option value="mixed" {% if farm.farm_type == 'mixed' %}selected{% endif %}>Mixed Crop & Livestock</option>
                    <option value="agroforestry" {% if farm.farm_type == 'agroforestry' %}selected{% endif %}>Agroforestry</option>
                    <option value="aquaculture" {% if farm.farm_type == 'aquaculture' %}selected{% endif %}>Aquaculture</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Address</label>
                <textarea name="address" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">{{ farm.address }}</textarea>
            </div>
            
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Save Changes</button>
                <a href="{% url 'core:farm_detail' farm.id %}" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
