{% extends "base.html" %}

{% block title %}Submit Advisory Request{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-4xl">
    <div class="mb-6">
        <a href="/advisory/" class="text-green-600 hover:text-green-700 font-semibold">
            ← Back to Advisory Dashboard
        </a>
    </div>

    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-gradient-to-r from-green-500 to-teal-600 p-6 text-white">
            <h1 class="text-2xl font-bold">Submit Advisory Request</h1>
            <p class="opacity-90">Get expert advice on farming challenges</p>
        </div>

        <div class="p-6">
            <form method="post">
                {% csrf_token %}
                
                <div class="space-y-6">
                    <!-- Request Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Request Type</label>
                        <select name="request_type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                            <option value="">Select request type</option>
                            {% for value, label in request_types %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Subject -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                        <input type="text" name="subject" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Brief description of your question">
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Detailed Description</label>
                        <textarea name="description" rows="5" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Provide detailed information about your question or problem"></textarea>
                    </div>

                    <!-- Optional Fields -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Crop Type (Optional)</label>
                            <input type="text" name="crop_type" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                placeholder="e.g., Maize, Wheat, Rice">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Animal Species (Optional)</label>
                            <input type="text" name="animal_species" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                placeholder="e.g., Cattle, Sheep, Poultry">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Field Area (Hectares) (Optional)</label>
                            <input type="number" name="field_area_hectares" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                placeholder="e.g., 2.5">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Animal Weight (kg) (Optional)</label>
                            <input type="number" name="animal_weight_kg" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                placeholder="e.g., 500">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-end space-x-4 mt-8">
                    <a href="/advisory/" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        Submit Request
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
